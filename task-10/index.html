<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 10: Image Gallery with Filter</title>
    <link rel="stylesheet" href="style.css">
    <script src="main.js" defer></script>
</head>
<body>

    <div class="page-container">
        <h1 class="page-title">Filtered Photo Gallery</h1>
        
        <div class="filter-controls">
            <button class="filter-btn active" data-filter="all">All Photos</button>
            <button class="filter-btn" data-filter="nature">Nature</button>
            <button class="filter-btn" data-filter="city">City</button>
            <button class="filter-btn" data-filter="food">Food</button>
        </div>

        <main id="galleryGrid" class="gallery-grid">
            
            <div class="gallery-item" data-category="nature">
                <img src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=600&auto=format&fit=crop&q=60" alt="Nature">
                <div class="item-overlay">
                    <span class="item-tag">Nature</span>
                </div>
            </div>

            <div class="gallery-item" data-category="city">
                <img src="https://images.unsplash.com/photo-1519501025264-65ba15a82390?w=600&auto=format&fit=crop&q=60" alt="City Skyscraper Skyline">
                <div class="item-overlay">
                    <span class="item-tag">City</span>
                </div>
            </div>

            <div class="gallery-item" data-category="food">
                <img src="https://images.unsplash.com/photo-1482049016688-2d3e1b311543?w=600&auto=format&fit=crop&q=60" alt="Food">
                <div class="item-overlay">
                    <span class="item-tag">Food</span>
                </div>
            </div>

            <div class="gallery-item" data-category="nature">
                <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=600&auto=format&fit=crop&q=60" alt="Nature">
                <div class="item-overlay">
                    <span class="item-tag">Nature</span>
                </div>
            </div>

            <div class="gallery-item" data-category="city">
                <img src="https://images.unsplash.com/photo-1496442226666-8d4d0e62e6e9?w=600&auto=format&fit=crop&q=60" alt="City Street Lights Neon">
                <div class="item-overlay">
                    <span class="item-tag">City</span>
                </div>
            </div>

            <div class="gallery-item" data-category="food">
                <img src="https://images.unsplash.com/photo-1565958011703-44f9829ba187?w=600&auto=format&fit=crop&q=60" alt="Food">
                <div class="item-overlay">
                    <span class="item-tag">Food</span>
                </div>
            </div>

        </main>
    </div>

</body>
</html>
